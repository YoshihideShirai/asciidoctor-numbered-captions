name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify package
        run: |
          npm run lint
          npm run format:check
          npm test

      - name: Pack package
        id: pack
        run: |
          set -euo pipefail
          npm pack
          TARBALL=$(node -e "const pkg = require('./package.json'); const safeName = pkg.name.startsWith('@') ? pkg.name.slice(1).replace('/', '-') : pkg.name; process.stdout.write(safeName + '-' + pkg.version + '.tgz')")
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ steps.pack.outputs.tarball }}
