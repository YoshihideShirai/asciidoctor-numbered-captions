name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version:
          - '20'
          - '22'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Check formatter
        run: npm run format:check

      - name: Run tests
        run: npm test

  install:
    name: Verify npm install
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Pack plugin
        run: npm pack

      - name: Install packed plugin in a clean project
        run: |
          mkdir -p /tmp/npm-install-check
          cd /tmp/npm-install-check
          npm init -y
          npm install "$GITHUB_WORKSPACE"/asciidoctor-numbered-captions-*.tgz

      - name: Verify plugin can be required
        run: |
          cd /tmp/npm-install-check
          node -e "const plugin = require('asciidoctor-numbered-captions'); if (typeof plugin.register !== 'function') { throw new Error('register export not found') }"
