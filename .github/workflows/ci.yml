name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 24]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test

  install:
    name: Verify npm install
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Pack plugin
        id: pack
        run: |
          set -euo pipefail
          npm pack
          TARBALL=$(node -e "const pkg = require('./package.json'); const safeName = pkg.name.startsWith('@') ? pkg.name.slice(1).replace('/', '-') : pkg.name; process.stdout.write(safeName + '-' + pkg.version + '.tgz')")
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"

      - name: Install packed plugin in a clean project
        id: install_check
        run: |
          set -euo pipefail
          WORKDIR=$(mktemp -d)
          echo "workdir=${WORKDIR}" >> "$GITHUB_OUTPUT"
          cd "$WORKDIR"
          npm init -y
          npm install --no-audit --no-fund "$GITHUB_WORKSPACE/${{ steps.pack.outputs.tarball }}"

      - name: Verify plugin can be required
        run: |
          set -euo pipefail
          cd "${{ steps.install_check.outputs.workdir }}"
          node -e "const plugin = require('asciidoctor-numbered-captions'); if (typeof plugin.register !== 'function') { throw new Error('register export not found') }"
