name: CI

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version:
          - '20'
          - '22'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Check formatter
        run: npm run format:check

      - name: Run tests
        run: npm test

  install:
    name: Verify npm install
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Pack plugin
        id: pack
        run: |
          set -euo pipefail
          TARBALL=$(npm pack --json | node -e "const fs = require('node:fs'); const data = JSON.parse(fs.readFileSync(0, 'utf8')); process.stdout.write(data[0].filename)")
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"

      - name: Install packed plugin in a clean project
        id: install_check
        run: |
          set -euo pipefail
          WORKDIR=$(mktemp -d)
          echo "workdir=${WORKDIR}" >> "$GITHUB_OUTPUT"
          cd "$WORKDIR"
          npm init -y
          npm install --no-audit --no-fund "$GITHUB_WORKSPACE/${{ steps.pack.outputs.tarball }}"

      - name: Verify plugin can be required
        run: |
          set -euo pipefail
          cd "${{ steps.install_check.outputs.workdir }}"
          node -e "const plugin = require('asciidoctor-numbered-captions'); if (typeof plugin.register !== 'function') { throw new Error('register export not found') }"
